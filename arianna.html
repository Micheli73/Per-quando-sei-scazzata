<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Arianna tutta panna 🐸</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --teal:#00b89c;--teal2:#0d9488;--teal-light:#7fffd4;
  --bg:#07201e;--bg2:#0d2e2b;
  --text:#e0fff8;--text-muted:#7ab8b0;--text-dim:#3a7870;
  --font-head:'Baloo 2',cursive;--font-body:'Nunito',sans-serif;
}
html,body{min-height:100%;background:var(--bg);font-family:var(--font-body);color:var(--text);overflow-x:hidden;}
#screen-main,#screen-admin,#screen-pw,#screen-done{display:none;min-height:100vh;}
#screen-main.active,#screen-admin.active,#screen-pw.active,#screen-done.active{display:block;}
#bgCanvas{position:fixed;inset:0;z-index:0;pointer-events:none;}

.hero{position:relative;z-index:1;padding:1.6rem 1rem 0.7rem;text-align:center;}
.hero-photos{display:flex;justify-content:center;align-items:flex-end;margin-bottom:0.8rem;position:relative;height:86px;}
.hp{position:absolute;bottom:0;width:64px;height:64px;border-radius:50%;object-fit:cover;border:3px solid rgba(127,255,212,0.5);box-shadow:0 4px 18px rgba(0,0,0,0.4);animation:bob 2.8s ease-in-out infinite;}
.hp:nth-child(1){left:calc(50% - 102px);z-index:3;animation-delay:0s;}
.hp:nth-child(2){left:calc(50% - 34px);z-index:5;width:70px;height:70px;border-color:var(--teal-light);animation-delay:0.25s;}
.hp:nth-child(3){left:calc(50% + 36px);z-index:3;animation-delay:0.5s;}
@keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.hero-title{font-family:var(--font-head);font-size:1.75rem;font-weight:800;color:var(--teal-light);text-shadow:0 0 28px rgba(127,255,212,0.3);}
.hero-sub{font-size:0.76rem;color:var(--text-muted);margin-top:0.3rem;font-style:italic;}
.admin-btn{position:absolute;top:1.4rem;right:1rem;background:rgba(0,184,156,0.08);border:1px solid rgba(0,184,156,0.22);color:var(--text-dim);font-size:0.65rem;padding:5px 10px;border-radius:20px;cursor:pointer;font-family:var(--font-body);font-weight:700;}

.prog-wrap{position:relative;z-index:1;padding:0.5rem 1.3rem 0.9rem;}
.prog-row{display:flex;justify-content:space-between;margin-bottom:5px;}
.prog-txt{font-size:0.68rem;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:0.04em;}
.prog-bar{height:4px;background:rgba(0,184,156,0.1);border-radius:10px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--teal-light));border-radius:10px;transition:width 0.7s cubic-bezier(.4,0,.2,1);}

.categories{position:relative;z-index:1;padding:0 0.9rem 2rem;}
.cat-block{margin-bottom:1.7rem;}
.cat-label{font-family:var(--font-head);font-size:0.85rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;padding:0.28rem 0.7rem;border-left:3px solid;margin-bottom:0.7rem;display:block;}
.cards-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.6rem;}
.cards-grid.single{grid-template-columns:1fr;}

.env{position:relative;border-radius:20px;min-height:110px;cursor:pointer;overflow:hidden;transition:transform 0.13s,box-shadow 0.13s;border:1.5px solid rgba(0,184,156,0.15);}
.env:active{transform:scale(0.95);}
.env:not(.opened):hover{transform:translateY(-3px);box-shadow:0 6px 22px rgba(0,0,0,0.35);}
.env.opened{cursor:default;border-color:rgba(0,184,156,0.35);}
.env-closed{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:14px 10px;height:100%;min-height:110px;position:relative;overflow:hidden;}
.env-closed::before{content:'';position:absolute;inset:0;opacity:0.06;background:radial-gradient(circle at 60% 40%,rgba(127,255,212,0.8),transparent 70%);}
.env-icon-wrap{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.6rem;border:1.5px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);}
.env-num{font-size:0.56rem;font-weight:800;letter-spacing:0.09em;text-transform:uppercase;opacity:0.45;}
.env-tap{font-size:0.52rem;opacity:0.3;}
.env-open{display:none;flex-direction:column;align-items:center;justify-content:center;padding:14px 12px;gap:7px;min-height:110px;}
.env.opened .env-closed{display:none;}
.env.opened .env-open{display:flex;}
.env-open-icon{font-size:1.1rem;}
.env-open-msg{font-size:0.75rem;line-height:1.5;text-align:center;font-weight:700;}
.env-open-badge{font-size:0.5rem;font-weight:800;border-radius:8px;padding:2px 8px;text-transform:uppercase;letter-spacing:0.05em;opacity:0.65;border:1px solid currentColor;}

.cat-insieme .cat-label{color:#7dc8ff;border-color:#7dc8ff;}
.cat-insieme .env{background:linear-gradient(145deg,#091828,#0d2244);}
.cat-insieme .env-num,.cat-insieme .env-tap{color:#7dc8ff;}
.cat-insieme .env-open-msg{color:#cce8ff;}
.cat-insieme .env-open-badge{color:#7dc8ff;}
.cat-domande .cat-label{color:#ffd966;border-color:#ffd966;}
.cat-domande .env{background:linear-gradient(145deg,#181500,#242000);}
.cat-domande .env-num,.cat-domande .env-tap{color:#ffd966;}
.cat-domande .env-open-msg{color:#fff3c0;}
.cat-domande .env-open-badge{color:#ffd966;}
.cat-dolci .cat-label{color:#ffb3ec;border-color:#ffb3ec;}
.cat-dolci .env{background:linear-gradient(145deg,#1c041a,#26062a);}
.cat-dolci .env-num,.cat-dolci .env-tap{color:#ffb3ec;}
.cat-dolci .env-open-msg{color:#ffe0f8;}
.cat-dolci .env-open-badge{color:#ffb3ec;}
.cat-urgenti .cat-label{color:#c9a0ff;border-color:#c9a0ff;}
.cat-urgenti .env{background:linear-gradient(145deg,#100826,#18093a);}
.cat-urgenti .env-num,.cat-urgenti .env-tap{color:#c9a0ff;}
.cat-urgenti .env-open-msg{color:#e8d8ff;}
.cat-urgenti .env-open-badge{color:#c9a0ff;}

/* DONE */
.done-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;gap:1.3rem;position:relative;z-index:1;text-align:center;}
.done-photos{display:flex;gap:0.6rem;justify-content:center;margin-bottom:0.3rem;}
.done-photo{width:58px;height:58px;border-radius:50%;object-fit:cover;border:3px solid rgba(127,255,212,0.5);box-shadow:0 4px 14px rgba(0,0,0,0.35);animation:bob 2.5s ease-in-out infinite;}
.done-photo:nth-child(2){animation-delay:0.3s;}
.done-photo:nth-child(3){animation-delay:0.6s;}
.done-title{font-family:var(--font-head);font-size:1.85rem;font-weight:800;color:var(--teal-light);text-shadow:0 0 24px rgba(127,255,212,0.3);}
.done-msg{font-size:0.95rem;color:var(--text-muted);line-height:1.65;max-width:280px;font-weight:600;}
.done-sub{font-size:0.8rem;color:var(--text-dim);font-style:italic;}
.done-admin-btn{background:rgba(0,184,156,0.12);border:1.5px solid rgba(0,184,156,0.35);color:var(--teal-light);padding:0.75rem 1.8rem;border-radius:50px;font-size:0.9rem;font-weight:800;font-family:var(--font-body);cursor:pointer;}
.done-back{background:transparent;border:1px solid rgba(127,255,212,0.2);color:var(--text-muted);padding:0.6rem 1.4rem;border-radius:50px;font-size:0.8rem;font-weight:700;font-family:var(--font-body);cursor:pointer;}

/* PW */
.pw-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;gap:1rem;position:relative;z-index:1;}
.pw-photo{width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid rgba(127,255,212,0.4);box-shadow:0 4px 16px rgba(0,0,0,0.3);margin-bottom:0.3rem;}
.pw-title{font-family:var(--font-head);font-size:1.5rem;color:var(--teal-light);text-align:center;font-weight:800;}
.pw-input{width:100%;max-width:300px;padding:0.8rem 1rem;border-radius:50px;border:1.5px solid rgba(0,184,156,0.3);background:rgba(0,184,156,0.05);color:var(--text);font-size:1rem;font-family:var(--font-body);text-align:center;outline:none;}
.pw-input:focus{border-color:var(--teal);}
.pw-btn{width:100%;max-width:300px;padding:0.85rem;border-radius:50px;background:var(--teal);color:#07201e;font-weight:800;font-size:1rem;border:none;cursor:pointer;font-family:var(--font-body);}
.pw-error{color:#ff8888;font-size:0.82rem;display:none;font-weight:700;}
.pw-back{color:var(--text-muted);font-size:0.8rem;cursor:pointer;text-decoration:underline;}

/* ADMIN */
.admin-wrap{position:relative;z-index:1;padding:1.3rem;}
.admin-header{display:flex;align-items:center;gap:0.8rem;margin-bottom:1.4rem;}
.admin-back-btn{background:rgba(0,184,156,0.1);border:1px solid rgba(0,184,156,0.25);color:var(--teal);font-size:0.8rem;padding:6px 14px;border-radius:20px;cursor:pointer;font-family:var(--font-body);font-weight:700;}
.admin-title{font-family:var(--font-head);font-size:1.3rem;color:var(--teal-light);font-weight:800;}
.admin-form{background:var(--bg2);border-radius:16px;border:1px solid rgba(0,184,156,0.12);padding:1.2rem;margin-bottom:1.3rem;}
.form-label{font-size:0.72rem;color:var(--text-muted);margin-bottom:4px;display:block;font-weight:800;text-transform:uppercase;letter-spacing:0.05em;}
.form-select,.form-textarea{width:100%;padding:0.65rem 0.9rem;border-radius:12px;border:1px solid rgba(0,184,156,0.2);background:rgba(0,184,156,0.04);color:var(--text);font-size:0.85rem;font-family:var(--font-body);margin-bottom:1rem;outline:none;}
.form-select:focus,.form-textarea:focus{border-color:var(--teal);}
.form-select option{background:#0d2e2b;}
.form-textarea{min-height:85px;resize:vertical;}
.add-btn{width:100%;padding:0.8rem;border-radius:50px;background:var(--teal);color:#07201e;font-weight:800;font-size:0.95rem;border:none;cursor:pointer;font-family:var(--font-body);}
.admin-list-title{font-family:var(--font-head);font-size:1rem;color:var(--teal-light);margin-bottom:0.7rem;font-weight:700;}
.admin-card-item{background:var(--bg2);border-radius:10px;border:1px solid rgba(0,184,156,0.1);padding:0.8rem;margin-bottom:0.5rem;display:flex;align-items:flex-start;gap:0.6rem;}
.admin-card-text{font-size:0.78rem;color:var(--text);line-height:1.4;flex:1;}
.admin-card-meta{font-size:0.63rem;color:var(--text-dim);margin-top:2px;}
.del-btn{background:rgba(255,80,80,0.1);border:1px solid rgba(255,80,80,0.2);color:#ff8888;font-size:0.7rem;padding:4px 9px;border-radius:8px;cursor:pointer;white-space:nowrap;font-family:var(--font-body);}
.success-msg{color:var(--teal);font-size:0.82rem;text-align:center;padding:0.5rem;display:none;font-weight:700;}
</style>
</head>

      <label class="form-label">Messaggio segreto</label>
      <textarea class="form-textarea" id="new-msg" placeholder="Scrivi qui il messaggio..."></textarea>
      <button class="add-btn" onclick="addCard()">➕ Aggiungi bigliettino</button>
      <div class="success-msg" id="success-msg">Bigliettino aggiunto! 🐸✨</div>
    </div>
    <div class="admin-list-title">Bigliettini salvati</div>
    <div id="admin-list"></div>
  </div>
</div>

<script>
// ===== ANIMATED BACKGROUND =====
(function(){
  const canvas=document.getElementById('bgCanvas');
  const ctx=canvas.getContext('2d');
  let W,H;
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  resize();window.addEventListener('resize',resize);
  const COLORS=['rgba(0,184,156,','rgba(127,255,212,','rgba(45,212,191,','rgba(13,148,136,','rgba(255,179,236,'];
  const particles=Array.from({length:55},()=>{
    return{
      x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,
      r:Math.random()*3+1,vx:(Math.random()-0.5)*0.4,vy:(Math.random()-0.5)*0.4,
      alpha:Math.random()*0.25+0.05,color:COLORS[Math.floor(Math.random()*COLORS.length)],
      pulse:Math.random()*Math.PI*2,ps:0.02+Math.random()*0.02
    };
  });
  const EMOJIS=['🐸','🍌','💙','🌊','✨','🩷','⭐'];
  const floaters=EMOJIS.map((e,i)=>{
    return{emoji:e,x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,
      vy:-0.28-Math.random()*0.28,vx:(Math.random()-0.5)*0.18,
      alpha:0.1+Math.random()*0.1,size:15+Math.random()*11,t:Math.random()*100};
  });
  function draw(){
    ctx.clearRect(0,0,W,H);
    particles.forEach(p=>{
      p.pulse+=p.ps;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=p.color+(p.alpha*(0.7+0.3*Math.sin(p.pulse)))+')';
      ctx.fill();p.x+=p.vx;p.y+=p.vy;
      if(p.x<-10||p.x>W+10||p.y<-10||p.y>H+10){
        p.x=Math.random()*W;p.y=Math.random()*H;
      }
    });
    floaters.forEach(f=>{
      f.t+=0.012;f.x+=f.vx+Math.sin(f.t)*0.28;f.y+=f.vy;
      if(f.y<-40){f.y=H+20;f.x=Math.random()*W;}
      ctx.globalAlpha=f.alpha;ctx.font=f.size+'px serif';
      ctx.fillText(f.emoji,f.x,f.y);ctx.globalAlpha=1;
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

// ===== APP STATE =====
// prevScreen traccia da dove viene l'admin (main o done)
let prevScreen='main';

const CAT_ICONS={
  insieme:['🌅','🚗','🌇','🎁','🎀','🫂'],
  domande:['🤔','🔍'],
  dolci:['👀','⭐','😊','🎬','🤍','🐸','🌊'],
  urgenti:['📢','🍌']
};
const PW='Tivogliobene';
const CAT_MAP={
  insieme:{label:'🌅 Quando siamo insieme',color:'cat-insieme'},
  domande:{label:'🤔 Domande',color:'cat-domande'},
  dolci:{label:'🩷 Per quando te lo sei dimenticato',color:'cat-dolci'},
  urgenti:{label:'📢 Comunicazioni urgenti',color:'cat-urgenti'}
};
const DEFAULT_CARDS=[
  {id:'i1',cat:'insieme',msg:'Buono valido per un gelato con me. Non scade mai.'},
  {id:'i2',cat:'insieme',msg:'Buono valido per una fuga di un giorno insieme. Quando vuoi.'},
  {id:'i3',cat:'insieme',msg:'Andiamo a vedere insieme il tramonto? Dimmi quando.'},
  {id:'i4',cat:'insieme',msg:'Apri il regalo numero 1 — questo è un ordine! 🐸'},
  {id:'i5',cat:'insieme',msg:'Apri il regalo numero 2 — stai aspettando? DAI! 🍌'},
  {id:'i6',cat:'insieme',msg:'Abbracciami. Adesso. Questo biglietto lo pretende. 🐸'},
  {id:'d1',cat:'domande',msg:'Una cosa stupida che ti fa ridere sempre?'},
  {id:'d2',cat:'domande',msg:'Cosa pensi che io capisca poco di te?'},
  {id:'do1',cat:'dolci',msg:'Mi piaci anche nelle parti che non fai vedere a tutti.'},
  {id:'do2',cat:'dolci',msg:'Sei importante, anche quando te lo dimentichi.'},
  {id:'do3',cat:'dolci',msg:"Il tuo sorriso mi cambia l'umore più di quanto pensi."},
  {id:'do4',cat:'dolci',msg:'Mi ricordo ancora quanto fossi bella quella sera al cinema.'},
  {id:'do5',cat:'dolci',msg:'Se oggi pesa tutto, appoggiati un attimo. Ci sono.'},
  {id:'do6',cat:'dolci',msg:"Sai qual è il tuo problema? Che mi piaci pure quando sei intrattabile."},
  {id:'do7',cat:'dolci',msg:'Anche quando fai la difficile, resti la mia scelta facile.'},
  {id:'u1',cat:'urgenti',msg:'Non discutere con questo biglietto.'},
  {id:'u2',cat:'urgenti',msg:'30% arrabbiata + 70% sorriso = te che mi fa impazzire 🐸'}
];

let allCards=[],openedIds=[];
function loadData(){
  try{allCards=JSON.parse(localStorage.getItem('arianna_c5'))||[...DEFAULT_CARDS];}catch(e){allCards=[...DEFAULT_CARDS];}
  try{openedIds=JSON.parse(localStorage.getItem('arianna_o5'))||[];}catch(e){openedIds=[];}
}
function saveCards(){try{localStorage.setItem('arianna_c5',JSON.stringify(allCards));}catch(e){}}
function saveOpened(){try{localStorage.setItem('arianna_o5',JSON.stringify(openedIds));}catch(e){}}

function setScreen(id){
  ['screen-main','screen-admin','screen-pw','screen-done'].forEach(s=>{
    document.getElementById(s).className=(s===id?'active':'');
  });
}

function playPop(){
  try{
    const a=new AudioContext();
    const o=a.createOscillator(),g=a.createGain();
    o.connect(g);g.connect(a.destination);o.type='sine';
    o.frequency.setValueAtTime(280,a.currentTime);
    o.frequency.exponentialRampToValueAtTime(880,a.currentTime+0.07);
    o.frequency.exponentialRampToValueAtTime(420,a.currentTime+0.22);
    g.gain.setValueAtTime(0.28,a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.38);
    o.start();o.stop(a.currentTime+0.4);
    [880,1108,1318,1760].forEach((f,i)=>{
      const o2=a.createOscillator(),g2=a.createGain();
      o2.connect(g2);g2.connect(a.destination);
      o2.type='triangle';o2.frequency.value=f;
      g2.gain.setValueAtTime(0.06,a.currentTime+0.09+i*0.05);
      g2.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.09+i*0.05+0.12);
      o2.start(a.currentTime+0.09+i*0.05);
      o2.stop(a.currentTime+0.09+i*0.05+0.14);
    });
  }catch(e){}
}

function getIcon(cat,idx){
  const list=CAT_ICONS[cat]||['💌'];
  return list[idx%list.length];
}

function checkAllOpened(){
  const total=allCards.length;
  const opened=openedIds.filter(id=>allCards.find(c=>c.id===id)).length;
  return total>0&&opened===total;
}

let browsingFromDone=false;

function updateProgress(fromClick){
  const total=allCards.length;
  const opened=openedIds.filter(id=>allCards.find(c=>c.id===id)).length;
  document.getElementById('prog-label').textContent=opened+' / '+total;
  document.getElementById('prog-fill').style.width=(total>0?Math.round(opened/total*100):0)+'%';
  if(fromClick&&total>0&&opened===total&&!browsingFromDone){
    setTimeout(()=>setScreen('screen-done'),900);
  }
}

function renderMain(){
  const container=document.getElementById('categories');
  container.innerHTML='';
  updateProgress(false);
  let idx=0;
  Object.keys(CAT_MAP).forEach(catKey=>{
    const cards=allCards.filter(c=>c.cat===catKey);
    if(!cards.length)return;
    const info=CAT_MAP[catKey];
    const block=document.createElement('div');
    block.className='cat-block '+info.color;
    block.innerHTML='<div class="cat-label">'+info.label+'</div>';
    const grid=document.createElement('div');
    grid.className='cards-grid'+(cards.length===1?' single':'');
    cards.forEach((card,li)=>{
      idx++;
      const isOpen=openedIds.includes(card.id);
      const icon=getIcon(catKey,li);
      const div=document.createElement('div');
      div.className='env'+(isOpen?' opened':'');
      div.innerHTML=`<div class="env-closed">
        <div class="env-icon-wrap">${icon}</div>
        <div class="env-num">busta #${idx}</div>
        <div class="env-tap">tocca per aprire</div>
      </div>
      <div class="env-open">
        <div class="env-open-icon">${icon}</div>
        <div class="env-open-msg"></div>
        <div class="env-open-badge">aperta ✓</div>
      </div>`;
      if(isOpen){div.querySelector('.env-open-msg').textContent=card.msg;}
      else{
        div.addEventListener('click',()=>{
          div.querySelector('.env-open-msg').textContent=card.msg;
          div.classList.add('opened');
          playPop();
          openedIds.push(card.id);
          saveOpened();
          updateProgress(true);
        });
      }
      grid.appendChild(div);
    });
    block.appendChild(grid);
    container.appendChild(block);
  });
}

function forceShowMain(){
  browsingFromDone=true;
  renderMain();
  setScreen('screen-main');
}

function showMain(){
  renderMain();
  if(checkAllOpened()){
    setScreen('screen-done');
  }else{
    setScreen('screen-main');
  }
}

function showDone(){
  setScreen('screen-done');
}

// goAdmin(from): 'main' o 'done'
function goAdmin(from){
  browsingFromDone=false;
  prevScreen=from||'main';
  document.getElementById('pw-input').value='';
  document.getElementById('pw-error').style.display='none';
  setScreen('screen-pw');
}

function goBackFromPw(){
  if(prevScreen==='done'){
    setScreen('screen-done');
  }else{
    setScreen('screen-main');
  }
}

function goBackFromAdmin(){
  if(prevScreen==='done'){
    setScreen('screen-done');
  }else{
    renderMain();
    setScreen('screen-main');
  }
}

function checkPw(){
  if(document.getElementById('pw-input').value===PW){
    setScreen('screen-admin');
    renderAdminList();
  }else{
    document.getElementById('pw-error').style.display='block';
  }
}
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.getElementById('screen-pw').classList.contains('active'))checkPw();
});

function renderAdminList(){
  const list=document.getElementById('admin-list');
  list.innerHTML='';
  if(!allCards.length){
    list.innerHTML='<div style="color:var(--text-dim);font-size:0.8rem;text-align:center;padding:1rem;">Nessun bigliettino.</div>';
    return;
  }
  [...allCards].reverse().forEach(card=>{
    const div=document.createElement('div');
    div.className='admin-card-item';
    div.innerHTML=`<div style="font-size:1.3rem;flex-shrink:0">${getIcon(card.cat,0)}</div>
      <div style="flex:1">
        <div class="admin-card-text">${card.msg.substring(0,70)}${card.msg.length>70?'...':''}</div>
        <div class="admin-card-meta">${CAT_MAP[card.cat]?.label||card.cat}</div>
      </div>
      <button class="del-btn" onclick="deleteCard('${card.id}')">🗑️</button>`;
    list.appendChild(div);
  });
}

function addCard(){
  const msg=document.getElementById('new-msg').value.trim();
  const cat=document.getElementById('new-cat').value;
  if(!msg){alert('Scrivi il messaggio!');return;}
  allCards.push({id:'u'+Date.now(),cat,msg});
  saveCards();
  // quando aggiungi una nuova frase, resetta gli aperti per non bloccarsi sulla done
  // No: lasciamo aperti quelli già aperti, solo la nuova non sarà aperta
  document.getElementById('new-msg').value='';
  const sm=document.getElementById('success-msg');
  sm.style.display='block';
  setTimeout(()=>sm.style.display='none',2200);
  renderAdminList();
}

function deleteCard(id){
  if(!confirm('Eliminare questo bigliettino?'))return;
  allCards=allCards.filter(c=>c.id!==id);
  openedIds=openedIds.filter(o=>o!==id);
  saveCards();saveOpened();
  renderAdminList();
}

loadData();showMain();
</script>
</body>
</html>
